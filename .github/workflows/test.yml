name: PR Test Gate

on:
  pull_request:
    branches:
      - main
      - staging

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Check for hardcoded secrets
        run: |
          # Check for common secret patterns in source code
          if grep -rn "sk-ant\|AKIA\|password\s*=\s*['\"][^'\"]*['\"]" \
            packages/backend/src/ packages/frontend/src/ \
            --include="*.ts" --include="*.tsx" --include="*.js" | \
            grep -v "\.env\.example\|test\|spec\|mock\|\.d\.ts"; then
            echo "::error::Potential hardcoded secrets found!"
            exit 1
          fi

      - name: Run backend tests with coverage
        # `--` separates the jest args from npm. json-summary is the report
        # format the next step parses; text keeps a readable stdout line.
        # Thresholds in jest.config.js cause this step to fail on regression.
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=json-summary
        working-directory: packages/backend

      - name: Post backend coverage summary
        if: always()
        run: |
          echo "## Backend Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          if [ -f packages/backend/coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./packages/backend/coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct.toFixed(1) + '%';
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements | ' + fmt(c.statements) + ' |');
              console.log('| Branches   | ' + fmt(c.branches)   + ' |');
              console.log('| Functions  | ' + fmt(c.functions)  + ' |');
              console.log('| Lines      | ' + fmt(c.lines)      + ' |');
            " >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_Coverage report not found — backend tests likely failed before coverage was written._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build backend
        run: npm run build
        working-directory: packages/backend

      - name: Run frontend tests
        run: npm test
        working-directory: packages/frontend

  # ================================
  # Schema Migration Diff
  # ================================
  # Runs `prisma migrate diff` between the committed migrations directory and
  # schema.prisma, and surfaces the generated SQL to reviewers. If the diff is
  # non-empty, it means a contributor changed schema.prisma without committing
  # a migration file — deploys now run `prisma migrate deploy`, not `db push`,
  # so the migration must be generated locally via `npm run db:migrate:create`
  # and checked in before merge.
  migration-diff:
    name: Schema Migration Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate migration SQL diff
        id: migration_diff
        working-directory: packages/backend
        run: |
          set +e
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --script \
            --shadow-database-url "postgresql://postgres:postgres@localhost:5432/shadow" \
            > /tmp/migration-diff.sql 2> /tmp/migration-diff.err
          EXIT=$?
          set -e

          if [ $EXIT -ne 0 ]; then
            echo "::error::prisma migrate diff failed (exit $EXIT)"
            cat /tmp/migration-diff.err
            exit $EXIT
          fi

          if [ ! -s /tmp/migration-diff.sql ] || grep -q "^-- This is an empty migration" /tmp/migration-diff.sql; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Schema Migration Diff"
              echo ""
              echo "No schema drift — \`prisma/schema.prisma\` matches applied migrations."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Schema Migration Diff"
              echo ""
              echo "\`schema.prisma\` differs from applied migrations. Generate a migration file with \`npm run db:migrate:create -w @healthcareproviderdb/backend\` and commit it before merge — deploys run \`prisma migrate deploy\`, not \`db push\`."
              echo ""
              echo "<details><summary>SQL that would be generated</summary>"
              echo ""
              echo '```sql'
              cat /tmp/migration-diff.sql
              echo '```'
              echo ""
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post migration diff as PR comment
        if: steps.migration_diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sql = fs.readFileSync('/tmp/migration-diff.sql', 'utf8').trim();
            const marker = '<!-- migration-diff-comment -->';
            const body = [
              marker,
              '### Schema Migration Diff',
              '',
              '`schema.prisma` differs from the applied migrations in `packages/backend/prisma/migrations/`. Generate a migration file locally with `npm run db:migrate:create -w @healthcareproviderdb/backend` and commit it — deploys run `prisma migrate deploy`, not `db push`.',
              '',
              '<details><summary>SQL that would be generated</summary>',
              '',
              '```sql',
              sql,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
