name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  BACKEND_SERVICE: verifymyprovider-backend
  FRONTEND_SERVICE: verifymyprovider-frontend

jobs:
  # ================================
  # Run Tests
  # ================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Run backend tests
        run: npm test
        working-directory: packages/backend

      - name: Build backend
        run: npm run build
        working-directory: packages/backend

  # ================================
  # Build and Deploy Backend
  # ================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    outputs:
      backend_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/backend/Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/verifymyprovider/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/verifymyprovider/${{ env.BACKEND_SERVICE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Node.js for migrations
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: |
          # Install Cloud SQL Auth Proxy
          curl -sSL -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

          # Start proxy in background (TCP on port 5432)
          ./cloud-sql-proxy verifymyprovider-prod:us-central1:verifymyprovider-db --port 5432 &
          PROXY_PID=$!
          sleep 3

          # Get DATABASE_URL from Secret Manager
          DB_URL=$(gcloud secrets versions access latest --secret=DATABASE_URL --project=${{ secrets.GCP_PROJECT_ID }})

          # Convert Unix socket URL to TCP URL for the local proxy
          # postgresql://user:pass@/db?host=/cloudsql/... → postgresql://user:pass@127.0.0.1:5432/db
          export DATABASE_URL=$(node -e "
            const url = process.argv[1];
            const m = url.match(/^(postgres(?:ql)?:\/\/[^@]+)@\/([^?]+)\?host=\/cloudsql\/[^&]+&?(.*)/);
            if (m) {
              const extra = m[3] ? '?' + m[3] : '';
              console.log(m[1] + '@127.0.0.1:5432/' + m[2] + extra);
            } else {
              console.log(url);
            }
          " "$DB_URL")

          # Apply versioned migrations — reviewed at PR time via migration-diff job
          cd packages/backend
          npm run db:migrate:deploy

          kill $PROXY_PID

      - name: Deploy Backend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/verifymyprovider/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --concurrency=80
            --add-cloudsql-instances=verifymyprovider-prod:us-central1:verifymyprovider-db
          env_vars: |
            NODE_ENV=production
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            ADMIN_SECRET=ADMIN_SECRET:latest
            RECAPTCHA_SECRET_KEY=RECAPTCHA_SECRET_KEY:latest
            JWT_SECRET=JWT_SECRET:latest
            RESEND_API_KEY=RESEND_API_KEY:latest
            INSURANCE_ENCRYPTION_KEY=INSURANCE_ENCRYPTION_KEY:latest
            CSRF_SECRET=CSRF_SECRET:latest

      - name: Smoke test backend
        run: |
          sleep 10
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/health")
          if [ "$HEALTH" != "200" ]; then
            echo "Health check failed with status $HEALTH"
            exit 1
          fi

      - name: Show Backend URL
        run: echo "Backend deployed to ${{ steps.deploy.outputs.url }}"

  # ================================
  # Build and Deploy Frontend
  # ================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: deploy-backend

    outputs:
      frontend_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/frontend/Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/verifymyprovider/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/verifymyprovider/${{ env.FRONTEND_SERVICE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ needs.deploy-backend.outputs.backend_url }}/api/v1
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Frontend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/verifymyprovider/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --concurrency=80
            --startup-probe-http-path=/
            --startup-probe-initial-delay=5s
            --startup-probe-period=10s
            --startup-probe-failure-threshold=3
          env_vars: |
            NODE_ENV=production
          secrets: |
            ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest

      - name: Smoke test frontend
        run: |
          # Frontend cold starts (Next.js SSR + chunk hydration) can take longer
          # than the backend's. Retry up to 3 times with a short sleep before
          # failing the deploy.
          MAX_ATTEMPTS=3
          ATTEMPT=1
          HTTP_STATUS=0
          sleep 10
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ steps.deploy.outputs.url }}" || true)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Frontend smoke test passed (HTTP $HTTP_STATUS) on attempt $ATTEMPT"
              exit 0
            fi
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: got HTTP $HTTP_STATUS, retrying in 5s..."
            ATTEMPT=$((ATTEMPT + 1))
            sleep 5
          done
          echo "Frontend smoke test failed after $MAX_ATTEMPTS attempts; last status: $HTTP_STATUS"
          exit 1

      - name: Show Frontend URL
        run: echo "Frontend deployed to ${{ steps.deploy.outputs.url }}"

  # ================================
  # Post-Deploy Summary
  # ================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    # statuses: write is required by the commit-status step below so
    # the deploy outcome is visible on the commit/PR page, not just in
    # the Actions tab. contents: read is the default minimum.
    permissions:
      contents: read
      statuses: write

    steps:
      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.deploy-backend.result }} | ${{ needs.deploy-backend.outputs.backend_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-frontend.result }} | ${{ needs.deploy-frontend.outputs.frontend_url }} |" >> $GITHUB_STEP_SUMMARY

      # Post a commit status so the deploy outcome appears as a green/red
      # check on the commit itself (visible in the PR view and commit log),
      # not just as a step-summary hidden inside a workflow run.
      - name: Post deployment commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const backendStatus = '${{ needs.deploy-backend.result }}';
            const frontendStatus = '${{ needs.deploy-frontend.result }}';
            const success = backendStatus === 'success' && frontendStatus === 'success';
            const environment = 'production';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: success
                ? `${environment} deploy succeeded`
                : `${environment} deploy failed (backend: ${backendStatus}, frontend: ${frontendStatus})`,
              context: `deploy/${environment}`,
            });

            if (!success) {
              core.error(`${environment.toUpperCase()} DEPLOYMENT FAILED — backend: ${backendStatus}, frontend: ${frontendStatus}`);
            }

      # Failure-only notification — successful deploys stay quiet. The step
      # is gated on SLACK_WEBHOOK_URL being set so the workflow doesn't
      # break before the secret is configured.
      #
      # Setup:
      #   1. In Slack, create an incoming webhook (https://api.slack.com/messaging/webhooks)
      #      for the channel that should receive deploy alerts.
      #   2. Add the resulting URL as a repo secret named SLACK_WEBHOOK_URL
      #      (Settings → Secrets and variables → Actions → New repository secret).
      - name: Notify Slack on failure
        # GitHub Actions doesn't allow `secrets` context inside `if:`
        # expressions, so the secret-presence check has to live at runtime
        # (env-injection + bash). When SLACK_WEBHOOK_URL is unset the step
        # logs a `::warning::` and exits cleanly — failures aren't silent
        # while the integration is being wired.
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ENVIRONMENT: production
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::Deployment failed. Configure the SLACK_WEBHOOK_URL repo secret to receive Slack notifications."
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"🚨 Deploy failed for ${GITHUB_REPOSITORY} on ${GITHUB_REF_NAME} (${SHORT_SHA})\\nWorkflow: ${GITHUB_WORKFLOW}\\n<${RUN_URL}|View run>\"}" \
            "$SLACK_WEBHOOK_URL"
