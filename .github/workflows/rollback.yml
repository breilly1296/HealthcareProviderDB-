name: Rollback Cloud Run Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to roll back'
        required: true
        type: choice
        options:
          - backend
          - frontend
          - both
      revision:
        description: 'Specific revision name (leave empty to roll back to previous revision)'
        required: false
        type: string

env:
  GCP_REGION: us-central1

jobs:
  rollback-backend:
    name: Rollback Backend
    if: ${{ inputs.service == 'backend' || inputs.service == 'both' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: List recent backend revisions
        run: |
          echo "## Recent Backend Revisions" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          gcloud run revisions list \
            --service=verifymyprovider-backend \
            --region=${{ env.GCP_REGION }} \
            --limit=5 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Determine target revision
        id: target
        run: |
          if [ -n "${{ inputs.revision }}" ]; then
            echo "revision=${{ inputs.revision }}" >> $GITHUB_OUTPUT
            echo "Rolling back to specified revision: ${{ inputs.revision }}"
          else
            PREVIOUS=$(gcloud run revisions list \
              --service=verifymyprovider-backend \
              --region=${{ env.GCP_REGION }} \
              --limit=2 \
              --format='value(REVISION)' | tail -n 1)
            if [ -z "$PREVIOUS" ]; then
              echo "No previous revision found"
              exit 1
            fi
            echo "revision=$PREVIOUS" >> $GITHUB_OUTPUT
            echo "Rolling back to previous revision: $PREVIOUS"
          fi

      - name: Route traffic to target revision
        run: |
          gcloud run services update-traffic verifymyprovider-backend \
            --region=${{ env.GCP_REGION }} \
            --to-revisions=${{ steps.target.outputs.revision }}=100
          echo "Backend rolled back to revision: ${{ steps.target.outputs.revision }}"

      - name: Smoke test backend
        run: |
          sleep 10
          BACKEND_URL=$(gcloud run services describe verifymyprovider-backend \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Backend smoke test failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Backend smoke test passed (HTTP $HTTP_STATUS)"

      - name: Rollback summary
        run: |
          echo "## Backend Rollback Result" >> $GITHUB_STEP_SUMMARY
          echo "Rolled back **verifymyprovider-backend** to revision \`${{ steps.target.outputs.revision }}\`" >> $GITHUB_STEP_SUMMARY

  rollback-frontend:
    name: Rollback Frontend
    if: ${{ inputs.service == 'frontend' || inputs.service == 'both' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: List recent frontend revisions
        run: |
          echo "## Recent Frontend Revisions" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          gcloud run revisions list \
            --service=verifymyprovider-frontend \
            --region=${{ env.GCP_REGION }} \
            --limit=5 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Determine target revision
        id: target
        run: |
          if [ -n "${{ inputs.revision }}" ]; then
            echo "revision=${{ inputs.revision }}" >> $GITHUB_OUTPUT
            echo "Rolling back to specified revision: ${{ inputs.revision }}"
          else
            PREVIOUS=$(gcloud run revisions list \
              --service=verifymyprovider-frontend \
              --region=${{ env.GCP_REGION }} \
              --limit=2 \
              --format='value(REVISION)' | tail -n 1)
            if [ -z "$PREVIOUS" ]; then
              echo "No previous revision found"
              exit 1
            fi
            echo "revision=$PREVIOUS" >> $GITHUB_OUTPUT
            echo "Rolling back to previous revision: $PREVIOUS"
          fi

      - name: Route traffic to target revision
        run: |
          gcloud run services update-traffic verifymyprovider-frontend \
            --region=${{ env.GCP_REGION }} \
            --to-revisions=${{ steps.target.outputs.revision }}=100
          echo "Frontend rolled back to revision: ${{ steps.target.outputs.revision }}"

      - name: Smoke test frontend
        run: |
          sleep 10
          FRONTEND_URL=$(gcloud run services describe verifymyprovider-frontend \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Frontend smoke test failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Frontend smoke test passed (HTTP $HTTP_STATUS)"

      - name: Rollback summary
        run: |
          echo "## Frontend Rollback Result" >> $GITHUB_STEP_SUMMARY
          echo "Rolled back **verifymyprovider-frontend** to revision \`${{ steps.target.outputs.revision }}\`" >> $GITHUB_STEP_SUMMARY

  # ================================
  # Post-Rollback Notification Summary
  # ================================
  # Aggregates both rollback jobs (either can be skipped depending on the
  # `service` input) and surfaces the outcome as a commit status + failure
  # annotation. Mirrors the deploy workflows so rollback visibility is
  # consistent across promote and revert paths.
  summary:
    name: Rollback Summary
    runs-on: ubuntu-latest
    needs: [rollback-backend, rollback-frontend]
    if: always()
    permissions:
      contents: read
      statuses: write

    steps:
      - name: Rollback Summary
        run: |
          echo "## Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Scope | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ inputs.service == 'backend' || inputs.service == 'both' && 'targeted' || 'skipped' }} | ${{ needs.rollback-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ inputs.service == 'frontend' || inputs.service == 'both' && 'targeted' || 'skipped' }} | ${{ needs.rollback-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target revision:** ${{ inputs.revision || '(previous revision, auto-detected)' }}" >> $GITHUB_STEP_SUMMARY

      - name: Post rollback commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const backendResult = '${{ needs.rollback-backend.result }}';
            const frontendResult = '${{ needs.rollback-frontend.result }}';
            const targetService = '${{ inputs.service }}';
            const targetRevision = '${{ inputs.revision }}' || 'previous';

            // A skipped job means this scope wasn't targeted — treat as
            // neutral (not a failure). Only `failure` or `cancelled` on a
            // targeted job should mark the rollback as failed.
            const jobFailed = (result) => result === 'failure' || result === 'cancelled';
            const backendFailed = (targetService === 'backend' || targetService === 'both') && jobFailed(backendResult);
            const frontendFailed = (targetService === 'frontend' || targetService === 'both') && jobFailed(frontendResult);
            const success = !backendFailed && !frontendFailed;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: success
                ? `rollback of ${targetService} → ${targetRevision} succeeded`
                : `rollback of ${targetService} failed (backend: ${backendResult}, frontend: ${frontendResult})`,
              context: `rollback/production`,
            });

            if (!success) {
              core.error(`PRODUCTION ROLLBACK FAILED — service: ${targetService}, target: ${targetRevision}, backend: ${backendResult}, frontend: ${frontendResult}`);
            }

      # Activation instructions match the deploy workflows — see comment
      # block in .github/workflows/deploy.yml for Slack webhook setup.
      - name: Notify on failure (placeholder — wire SLACK_WEBHOOK_URL to activate)
        if: failure()
        env:
          TARGET_SERVICE: ${{ inputs.service }}
          TARGET_REVISION: ${{ inputs.revision }}
        run: |
          echo "::warning::Rollback failed. Configure SLACK_WEBHOOK_URL secret to enable Slack notifications."
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\":rewind: *Rollback failed* — service \`${TARGET_SERVICE}\` to revision \`${TARGET_REVISION:-previous}\`. <https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|View run>\"}" \
          #   "${{ secrets.SLACK_WEBHOOK_URL }}"
